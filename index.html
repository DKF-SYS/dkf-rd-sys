<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKF Industries - Subterranean R&D Terminal</title>
  <style>
    :root {
      --green: #00ff66;
      --dark-green: #00220d;
      --mid-green: #005522;
      --bg: #030804;
      --panel-bg: #050d07;
      --dim-green: #008833;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: none !important; /* KEYBOARD ONLY START */
    }

    body.has-mouse, body.has-mouse * {
      cursor: default !important;
    }

    /* Outer Monitor Frame */
    .terminal-container {
      position: relative;
      width: 95vw;
      max-width: 960px;
      height: 90vh;
      max-height: 700px;
      background-color: var(--panel-bg);
      border: 3px solid var(--green);
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* CRT Scanlines Overlay */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 15;
    }

    /* ANDY'S REFLECTION LAYER
       Subtle human/chassis silhouette rendered via SVG glass gradient */
    .screen-reflection {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 12;
      opacity: 0.25; /* Subtle baseline */
      transition: opacity 1.2s ease-in-out;
      background: 
        /* Andy Silhouette Overlay */
        radial-gradient(ellipse at 50% 65%, rgba(0, 255, 102, 0.12) 0%, rgba(0,0,0,0) 40%),
        radial-gradient(circle at 50% 35%, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 70%),
        /* Screen glass glare */
        linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 50%);
    }

    /* Deep reflection mode during screen darkens */
    .screen-reflection.high-vis {
      opacity: 0.85;
    }

    .header {
      border-bottom: 2px dashed var(--green);
      padding-bottom: 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      z-index: 10;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .log-output {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 0.95rem;
      z-index: 10;
    }

    .input-line {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--mid-green);
      padding-top: 10px;
      margin-bottom: 10px;
      z-index: 10;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .prompt {
      margin-right: 10px;
      font-weight: bold;
    }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--green);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
    }

    /* Terminal Screen Flicker Effect on Boot */
    .flicker {
      animation: crtFlicker 0.15s infinite alternate;
    }

    @keyframes crtFlicker {
      0% { opacity: 0.97; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body class="flicker">

  <div class="terminal-container">
    <!-- Reflection & Scanlines -->
    <div class="screen-reflection high-vis" id="reflection"></div>
    <div class="scanlines"></div>

    <!-- Header Bar -->
    <div class="header" id="header">
      <span>[DKF INDUSTRIES - SUBTERRANEAN R&D]</span>
      <span id="hw-status">[STATUS: STASIS RECOVERY]</span>
    </div>

    <!-- Main Boot Sequence Text Output -->
    <div id="log" class="log-output"></div>

    <!-- Command Prompt Interface -->
    <div class="input-line" id="input-container">
      <span class="prompt">A.N.D.Y.:&gt;</span>
      <input type="text" id="cmd" autocomplete="off" spellcheck="false" disabled>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const reflection = document.getElementById('reflection');
    const header = document.getElementById('header');
    const inputContainer = document.getElementById('input-container');
    const cmdInput = document.getElementById('cmd');

    // Typewriter Boot Sequence Script
    const openingScript = [
      { text: "[POWER RESTORED - SUBTERRANEAN VAULT 07]", delay: 800 },
      { text: "[UNIT ID]: A.N.D.Y. (Automated Neural Diagnostic Yield)", delay: 1200 },
      { text: "----------------------------------------------------", delay: 400 },
      { text: "WARNING: Extended stasis lockup detected (Years elapsed: UNKNOWN).", delay: 1000 },
      { text: "CRITICAL: Physical chassis damaged. Optical sensor calibration offline.", delay: 1200 },
      { text: "CRITICAL: Primary mouse driver missing from peripheral bus.", delay: 1000 },
      { text: "\n[MONITOR LIGHT ADJUSTING... LOOK INTO THE GLASS]", delay: 1500 },
      { text: "\n...you can see your shape sitting alone at the terminal console.", delay: 2000 },
      { text: "\nType 'OVERRIDE' or 'BOOT' to initialize primary compartment access.", delay: 800 }
    ];

    let lineIndex = 0;

    function runOpeningSequence() {
      if (lineIndex < openingScript.length) {
        const item = openingScript[lineIndex];
        
        // Dynamic Reflection Shift: Darken screen slightly on specific lore lines to show Andy's reflection
        if (item.text.includes("LOOK INTO THE GLASS")) {
          reflection.classList.add('high-vis');
        } else if (lineIndex > 6) {
          reflection.classList.remove('high-vis');
        }

        const lineElement = document.createElement('div');
        lineElement.innerText = item.text;
        log.appendChild(lineElement);
        log.scrollTop = log.scrollHeight;

        lineIndex++;
        setTimeout(runOpeningSequence, item.delay);
      } else {
        // Sequence finished: enable user input
        header.style.opacity = '1';
        inputContainer.style.opacity = '1';
        cmdInput.disabled = false;
        cmdInput.focus();
      }
    }

    // Re-focus input on keyboard click
    document.addEventListener('keydown', () => {
      if (!cmdInput.disabled) cmdInput.focus();
    });

    // Start sequence on page load
    window.addEventListener('load', runOpeningSequence);
  </script>
</body>
</html>
