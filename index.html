<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DKF Industries - Subterranean R&D Terminal</title>
  <style>
    :root {
      --green: #00ff66;
      --dark-green: #00220d;
      --mid-green: #005522;
      --bg: #030804;
      --panel-bg: #050d07;
      --dim-green: #008833;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      cursor: default;
    }

    /* Terminal Window Container */
    .terminal-container {
      position: relative;
      width: 95vw;
      max-width: 960px;
      height: 90vh;
      max-height: 700px;
      background-color: var(--panel-bg);
      border: 3px solid var(--green);
      box-shadow: 0 0 25px rgba(0, 255, 102, 0.15);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* CRT Scanlines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 15;
    }

    /* ALWAYS-VISIBLE SUBTLE REFLECTION LAYER */
    .reflection-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 14;
      
      /* Subtle persistent baseline opacity */
      opacity: 0.12; 
      transition: opacity 0.25s ease-in-out;
      mix-blend-mode: screen;
      
      /* Image Asset Config */
      background-image: url('andy monitor reflection.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(0.8px) contrast(1.1);
    }

    /* Gentle flare when text phosphor fires */
    .reflection-container.active {
      opacity: 0.22;
    }

    /* Glass Curvature Vignette */
    .glass-curvature {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, transparent 60%, rgba(0, 0, 0, 0.65) 100%);
      pointer-events: none;
      z-index: 16;
    }

    /* Splash Screen */
    .splash-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: var(--panel-bg);
      z-index: 20;
      opacity: 1;
      transition: opacity 1s ease-out;
      text-align: center;
      padding: 10px;
    }

    .splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ascii-art {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      line-height: 1.1;
      font-weight: bold;
      white-space: pre;
      color: var(--green);
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.7);
      margin-bottom: 12px;
    }

    .splash-industries {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 12px;
      color: var(--green);
      text-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
      margin-bottom: 18px;
      text-indent: 12px;
    }

    .header {
      border-bottom: 2px dashed var(--green);
      padding-bottom: 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      z-index: 10;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .log-output {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 15px;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 0.95rem;
      z-index: 10;
    }

    .input-line {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--mid-green);
      padding-top: 10px;
      margin-bottom: 10px;
      z-index: 10;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .prompt {
      margin-right: 10px;
      font-weight: bold;
    }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--green);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      cursor: text;
    }
  </style>
</head>
<body>

  <div class="terminal-container">
    <!-- CRT Overlays & Continuous Image Reflection -->
    <div class="glass-curvature"></div>
    <div class="scanlines"></div>
    <div id="reflection" class="reflection-container"></div>

    <!-- 80s Splash Screen -->
    <div id="splash" class="splash-screen">
      <pre class="ascii-art">
  ██████╗  ██╗  ██╗ ███████╗
  ██╔══██╗ ██║ ██╔╝ ██╔════╝
  ██║  ██║ █████═╝  █████╗  
  ██║  ██║ ██╔═██╗  ██╔══╝  
  ██████╔╝ ██║  ██╗ ██║     
  ╚═════╝  ╚═╝  ╚═╝ ╚═╝     
      </pre>
      <div class="splash-industries">INDUSTRIES</div>
    </div>

    <!-- Terminal Header -->
    <div class="header" id="header">
      <span>[DKF INDUSTRIES - VAULT 07]</span>
      <span id="hw-status">[RAM: 64KB | MODE: MONOCHROME]</span>
    </div>

    <!-- Log Output Area -->
    <div id="log" class="log-output"></div>

    <!-- Command Prompt -->
    <div class="input-line" id="input-container">
      <span class="prompt">A.N.D.Y.:&gt;</span>
      <input type="text" id="cmd" autocomplete="off" spellcheck="false" disabled>
    </div>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const reflection = document.getElementById('reflection');
    const log = document.getElementById('log');
    const header = document.getElementById('header');
    const inputContainer = document.getElementById('input-container');
    const cmdInput = document.getElementById('cmd');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playKeyClick() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(700 + Math.random() * 150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.02);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.02);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.02);
    }

    const openingScript = [
      "[POWER RESTORED - SUBTERRANEAN VAULT 07]",
      "[UNIT ID]: A.N.D.Y. (Automated Neural Diagnostic Yield)",
      "----------------------------------------------------",
      "WARNING: Stasis lockup detected.",
      "CRITICAL: Optical sensor calibration offline.",
      "\n[MONITOR LIGHT ADJUSTING... OPTICAL SENSORS DETECT REFLECTION]",
      "\n[SECURITY CHECK]: TYPE 'ANDY' TO CONFIRM UNIT IDENTITY."
    ];

    let lineIndex = 0;

    function triggerReflectionPulse() {
      reflection.classList.add('active');
      setTimeout(() => reflection.classList.remove('active'), 180);
    }

    function runOpeningSequence() {
      if (lineIndex < openingScript.length) {
        const lineText = openingScript[lineIndex];
        const lineElement = document.createElement('div');
        log.appendChild(lineElement);

        let charIndex = 0;
        const typeInterval = setInterval(() => {
          if (charIndex < lineText.length) {
            lineElement.innerText += lineText[charIndex];
            playKeyClick();
            if (Math.random() > 0.35) triggerReflectionPulse();
            charIndex++;
          } else {
            clearInterval(typeInterval);
            lineIndex++;
            setTimeout(runOpeningSequence, 500);
          }
          log.scrollTop = log.scrollHeight;
        }, 30);
      } else {
        header.style.opacity = '1';
        inputContainer.style.opacity = '1';
        cmdInput.disabled = false;
        cmdInput.focus();
      }
    }

    cmdInput.addEventListener('keydown', (e) => {
      if (e.key.length === 1 || e.key === 'Backspace') {
        playKeyClick();
        triggerReflectionPulse();
      }

      if (e.key === 'Enter') {
        playKeyClick();
        const command = cmdInput.value.trim().toUpperCase();
        cmdInput.value = '';

        const response = document.createElement('div');
        if (command === 'ANDY' || command === 'A.N.D.Y.') {
          response.innerText = "\n[NEURAL LINK CONFIRMED: UNIT A.N.D.Y.]\n[MAGNETIC DEADBOLTS RELEASED - VAULT 01 OPEN]";
          reflection.style.opacity = '0.25'; // Elevates resting opacity once system powers up
        } else {
          response.innerText = `\n[IDENTITY MISMATCH]: '${command}' UNRECOGNIZED. TYPE 'ANDY'.`;
        }
        log.appendChild(response);
        log.scrollTop = log.scrollHeight;
      }
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        splash.classList.add('hidden');
        setTimeout(() => {
          splash.style.display = 'none';
          runOpeningSequence();
        }, 1000);
      }, 2500);
    });
  </script>
</body>
</html>
